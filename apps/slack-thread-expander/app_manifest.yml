display_information:
  name: thread-expander
  description: Expand threaded messages without "Also sent to the channel"
features:
  bot_user:
    display_name: thread-expander
    always_online: false
oauth_config:
  scopes:
    bot:
      - chat:write
    user:
      - search:read
      - channels:read
      - channels:history
      - groups:read
      - groups:history
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
