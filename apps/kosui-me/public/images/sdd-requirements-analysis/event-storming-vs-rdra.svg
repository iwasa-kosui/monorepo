<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e" />
    </marker>
  </defs>

  <rect width="800" height="320" fill="#fafafa" rx="8" />

  <!-- Upper row: Event Storming path -->
  <rect x="20" y="16" width="760" height="120" rx="8" fill="#fff" stroke="#fca5a5" stroke-width="1.5" />
  <text x="40" y="38" font-size="12" font-weight="700" fill="#991b1b">Event Storming</text>

  <!-- Sticky notes area -->
  <rect x="40" y="50" width="160" height="70" rx="6" fill="#fefce8" stroke="#facc15" stroke-width="1.5" />
  <!-- Sticky notes -->
  <rect x="52" y="58" width="40" height="28" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="0.8" />
  <text x="72" y="72" text-anchor="middle" font-size="7" fill="#92400e">Event A</text>
  <rect x="100" y="62" width="40" height="28" rx="2" fill="#fed7aa" stroke="#f97316" stroke-width="0.8" />
  <text x="120" y="76" text-anchor="middle" font-size="7" fill="#9a3412">Cmd B</text>
  <rect x="148" y="56" width="40" height="28" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.8" />
  <text x="168" y="70" text-anchor="middle" font-size="7" fill="#166534">Policy</text>
  <rect x="60" y="90" width="40" height="28" rx="2" fill="#fde68a" stroke="#f59e0b" stroke-width="0.8" />
  <text x="80" y="104" text-anchor="middle" font-size="7" fill="#92400e">Event C</text>
  <rect x="110" y="94" width="40" height="28" rx="2" fill="#bfdbfe" stroke="#3b82f6" stroke-width="0.8" />
  <text x="130" y="108" text-anchor="middle" font-size="7" fill="#1e40af">Read</text>
  <text x="120" y="132" text-anchor="middle" font-size="9" fill="#64748b">FigJam / Miro</text>

  <!-- Arrow: spatial → text conversion -->
  <line x1="210" y1="85" x2="258" y2="85" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)" />
  <text x="234" y="76" text-anchor="middle" font-size="8" fill="#ef4444">変換</text>

  <!-- Text conversion (lossy) -->
  <rect x="268" y="50" width="160" height="70" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" />
  <text x="348" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">テキスト構造化</text>
  <text x="348" y="86" text-anchor="middle" font-size="9" fill="#b91c1c">位置関係が欠落</text>
  <text x="348" y="100" text-anchor="middle" font-size="9" fill="#b91c1c">グルーピング境界が曖昧</text>
  <text x="348" y="114" text-anchor="middle" font-size="9" fill="#b91c1c">矢印の意味が消失</text>

  <!-- Arrow: text → agent -->
  <line x1="438" y1="85" x2="486" y2="85" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)" />

  <!-- Agent (sad) -->
  <rect x="496" y="50" width="120" height="70" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" />
  <text x="556" y="74" text-anchor="middle" font-size="22">&#x1F916;</text>
  <text x="556" y="96" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">情報欠落で</text>
  <text x="556" y="110" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">正しく解釈できない</text>

  <!-- Tried methods -->
  <rect x="640" y="50" width="126" height="70" rx="6" fill="#fff" stroke="#e2e8f0" stroke-width="1" />
  <text x="703" y="68" text-anchor="middle" font-size="9" fill="#64748b">試した転送方法:</text>
  <text x="703" y="84" text-anchor="middle" font-size="9" fill="#94a3b8">- Screenshot</text>
  <text x="703" y="98" text-anchor="middle" font-size="9" fill="#94a3b8">- CSV export</text>
  <text x="703" y="112" text-anchor="middle" font-size="9" fill="#94a3b8">- MCP</text>

  <!-- Lower row: RDRA path -->
  <rect x="20" y="156" width="760" height="148" rx="8" fill="#fff" stroke="#86efac" stroke-width="1.5" />
  <text x="40" y="178" font-size="12" font-weight="700" fill="#166534">RDRA</text>

  <!-- Markdown table -->
  <rect x="40" y="190" width="200" height="100" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" />
  <text x="140" y="210" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">Markdown表形式</text>
  <!-- Mini table -->
  <line x1="56" y1="220" x2="224" y2="220" stroke="#86efac" stroke-width="1" />
  <text x="72" y="236" font-size="8" fill="#15803d" font-weight="600">ID</text>
  <text x="110" y="236" font-size="8" fill="#15803d" font-weight="600">要求</text>
  <text x="186" y="236" font-size="8" fill="#15803d" font-weight="600">関連</text>
  <line x1="56" y1="242" x2="224" y2="242" stroke="#d1fae5" stroke-width="1" />
  <text x="72" y="256" font-size="8" fill="#166534">REQ-1</text>
  <text x="110" y="256" font-size="8" fill="#166534">...したい</text>
  <text x="186" y="256" font-size="8" fill="#166534">GOAL-1</text>
  <line x1="56" y1="262" x2="224" y2="262" stroke="#d1fae5" stroke-width="1" />
  <text x="72" y="276" font-size="8" fill="#166534">REQ-2</text>
  <text x="110" y="276" font-size="8" fill="#166534">...できる</text>
  <text x="186" y="276" font-size="8" fill="#166534">GOAL-2</text>
  <text x="140" y="302" text-anchor="middle" font-size="9" fill="#64748b">そのままテキストとして構造化済み</text>

  <!-- Arrow: markdown → agent -->
  <line x1="250" y1="240" x2="358" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)" />
  <text x="304" y="232" text-anchor="middle" font-size="9" font-weight="600" fill="#22c55e">変換不要</text>

  <!-- Agent (happy) -->
  <rect x="368" y="190" width="160" height="100" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" />
  <text x="448" y="220" text-anchor="middle" font-size="22">&#x1F916;</text>
  <text x="448" y="244" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">構造をそのまま解釈</text>
  <text x="448" y="260" text-anchor="middle" font-size="9" fill="#15803d">ID参照で依存関係を追跡</text>
  <text x="448" y="276" text-anchor="middle" font-size="9" fill="#15803d">WHYの連鎖を遡れる</text>

  <!-- Arrow: agent → output -->
  <line x1="538" y1="240" x2="586" y2="240" stroke="#22c55e" stroke-width="2" marker-end="url(#arr-green)" />

  <!-- Output -->
  <rect x="596" y="190" width="170" height="100" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" />
  <text x="681" y="216" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">エージェントが</text>
  <text x="681" y="234" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">要求を正しく理解し</text>
  <text x="681" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">仕様・設計に反映</text>
  <text x="681" y="276" text-anchor="middle" font-size="9" fill="#15803d">GOAL → REQ → BUC</text>
  <text x="681" y="290" text-anchor="middle" font-size="9" fill="#15803d">の依存チェーンを保持</text>
</svg>