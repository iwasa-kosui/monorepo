<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 150" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="720" height="150" fill="#fafafa" rx="8" />

  <!-- Gap box -->
  <rect x="24" y="16" width="60" height="50" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" />
  <text x="54" y="42" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#ef4444">？</text>

  <!-- Callout bubble -->
  <rect x="4" y="78" width="160" height="38" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <polygon points="46,78 54,70 62,78" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <line x1="47" y1="77" x2="61" y2="77" stroke="#fef2f2" stroke-width="2" />
  <text x="84" y="91" text-anchor="middle" dominant-baseline="central" font-size="9.5" font-weight="600" fill="#991b1b">システムの受益者も</text>
  <text x="84" y="106" text-anchor="middle" dominant-baseline="central" font-size="9.5" font-weight="600" fill="#991b1b">要求を言語化できない</text>

  <!-- Arrow into Kiro flow -->
  <line x1="88" y1="41" x2="118" y2="41" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)" />

  <!-- Kiro flow bracket -->
  <rect x="128" y="6" width="580" height="80" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="418" y="20" text-anchor="middle" dominant-baseline="central" font-size="9" font-weight="600" fill="#64748b">Kiro のスコープ</text>

  <!-- requirements.md -->
  <rect x="140" y="30" width="140" height="46" rx="7" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" />
  <text x="210" y="47" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#1e40af">requirements.md</text>
  <text x="210" y="63" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#1d4ed8">ユーザーストーリー・受入基準</text>

  <line x1="284" y1="53" x2="310" y2="53" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- design.md -->
  <rect x="318" y="30" width="140" height="46" rx="7" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5" />
  <text x="388" y="47" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#3730a3">design.md</text>
  <text x="388" y="63" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#4338ca">アーキテクチャ・技術判断</text>

  <line x1="462" y1="53" x2="488" y2="53" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- tasks.md -->
  <rect x="496" y="30" width="140" height="46" rx="7" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" />
  <text x="566" y="47" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#4c1d95">tasks.md</text>
  <text x="566" y="63" text-anchor="middle" dominant-baseline="central" font-size="8" fill="#5b21b6">実装タスク</text>
</svg>