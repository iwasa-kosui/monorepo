<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="800" height="370" fill="#fafafa" rx="8" />

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Kiro の想定する出発点と、プラットフォーム領域の現実</text>

  <!-- ====== Upper row: Kiro's flow ====== -->
  <text x="40" y="68" font-size="12" font-weight="700" fill="#334155">Kiro のフロー</text>

  <!-- Prompt -->
  <rect x="40" y="82" width="140" height="56" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" />
  <text x="110" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">自然言語プロンプト</text>
  <text x="110" y="122" text-anchor="middle" font-size="9" fill="#64748b">（Why を人間が入力）</text>

  <line x1="184" y1="110" x2="218" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- requirements.md -->
  <rect x="226" y="82" width="150" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" />
  <text x="301" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">requirements.md</text>
  <text x="301" y="122" text-anchor="middle" font-size="9" fill="#1d4ed8">ユーザーストーリー・受入基準</text>

  <line x1="380" y1="110" x2="414" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- design.md -->
  <rect x="422" y="82" width="130" height="56" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5" />
  <text x="487" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">design.md</text>
  <text x="487" y="122" text-anchor="middle" font-size="9" fill="#4338ca">アーキテクチャ・技術判断</text>

  <line x1="556" y1="110" x2="590" y2="110" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- tasks.md -->
  <rect x="598" y="82" width="120" height="56" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" />
  <text x="658" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">tasks.md</text>
  <text x="658" y="122" text-anchor="middle" font-size="9" fill="#5b21b6">実装タスク</text>

  <!-- Kiro assumption annotation -->
  <rect x="40" y="148" width="336" height="28" rx="6" fill="#ecfdf5" stroke="#86efac" stroke-width="1" />
  <text x="208" y="167" text-anchor="middle" font-size="10" fill="#166534">Kiro の前提: 人間がある程度スラスラと要求を語れる状態</text>

  <!-- ====== Lower row: Platform reality ====== -->
  <text x="40" y="210" font-size="12" font-weight="700" fill="#334155">プラットフォーム領域の現実</text>

  <!-- Stakeholder state -->
  <rect x="40" y="224" width="180" height="70" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" />
  <text x="130" y="248" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">要求が言語化できない</text>
  <text x="130" y="266" text-anchor="middle" font-size="9" fill="#b91c1c">「チームリーダーですら</text>
  <text x="130" y="280" text-anchor="middle" font-size="9" fill="#b91c1c">まだ言葉にできていない」</text>

  <!-- Gap -->
  <line x1="224" y1="259" x2="282" y2="259" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-red)" />

  <rect x="290" y="232" width="80" height="54" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" />
  <text x="330" y="256" text-anchor="middle" font-size="16" font-weight="700" fill="#ef4444">？</text>
  <text x="330" y="274" text-anchor="middle" font-size="9" fill="#dc2626">ギャップ</text>

  <line x1="374" y1="259" x2="432" y2="259" stroke="#ef4444" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-red)" />

  <!-- requirements.md (grayed out) -->
  <rect x="440" y="232" width="150" height="54" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="5,3" />
  <text x="515" y="256" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">requirements.md</text>
  <text x="515" y="272" text-anchor="middle" font-size="9" fill="#94a3b8">書き始められない</text>

  <!-- Arrow down from "?" to annotation -->
  <line x1="330" y1="290" x2="330" y2="310" stroke="#ef4444" stroke-width="1.5" />

  <!-- Bottom annotation -->
  <rect x="120" y="312" width="420" height="40" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <text x="330" y="332" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">「そもそもどうやって requirements.md を出力するか」</text>
  <text x="330" y="346" text-anchor="middle" font-size="10" fill="#b91c1c">→ この記事で扱う要求分析がここを埋める</text>
</svg>