<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="800" height="260" fill="#fafafa" rx="8" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Kiro のフローと、プラットフォーム領域で感じるギャップ</text>

  <!-- Step 0: Stakeholder state (the real starting point) -->
  <rect x="24" y="56" width="140" height="66" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" />
  <text x="94" y="78" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">チームリーダーですら</text>
  <text x="94" y="93" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">要求を言語化できない</text>
  <text x="94" y="110" text-anchor="middle" font-size="9" fill="#b91c1c">プラットフォーム領域の現実</text>

  <!-- Gap arrow -->
  <line x1="168" y1="89" x2="206" y2="89" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)" />

  <!-- Gap box -->
  <rect x="214" y="60" width="70" height="58" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" />
  <text x="249" y="86" text-anchor="middle" font-size="18" font-weight="700" fill="#ef4444">？</text>
  <text x="249" y="106" text-anchor="middle" font-size="8" fill="#dc2626">ギャップ</text>

  <!-- Arrow into Kiro flow -->
  <line x1="288" y1="89" x2="318" y2="89" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)" />

  <!-- Kiro flow bracket -->
  <rect x="318" y="44" width="462" height="92" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="549" y="60" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Kiro のスコープ</text>

  <!-- requirements.md -->
  <rect x="330" y="68" width="130" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" />
  <text x="395" y="90" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">requirements.md</text>
  <text x="395" y="106" text-anchor="middle" font-size="9" fill="#1d4ed8">ユーザーストーリー</text>
  <text x="395" y="118" text-anchor="middle" font-size="9" fill="#1d4ed8">受入基準</text>

  <line x1="464" y1="96" x2="492" y2="96" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- design.md -->
  <rect x="500" y="68" width="120" height="56" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5" />
  <text x="560" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">design.md</text>
  <text x="560" y="108" text-anchor="middle" font-size="9" fill="#4338ca">アーキテクチャ</text>

  <line x1="624" y1="96" x2="652" y2="96" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- tasks.md -->
  <rect x="660" y="68" width="108" height="56" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" />
  <text x="714" y="92" text-anchor="middle" font-size="11" font-weight="600" fill="#4c1d95">tasks.md</text>
  <text x="714" y="108" text-anchor="middle" font-size="9" fill="#5b21b6">実装タスク</text>

  <!-- Kiro assumption -->
  <text x="395" y="156" text-anchor="middle" font-size="10" fill="#64748b">Kiro は人間がある程度スラスラと要求を語れる状態を想定</text>

  <!-- Bottom annotation -->
  <rect x="100" y="180" width="600" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <text x="400" y="204" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">「そもそもどうやって requirements.md を出力するか」が難しい</text>
  <text x="400" y="224" text-anchor="middle" font-size="10" fill="#b91c1c">→ この記事で扱う要求分析が、このギャップを埋める</text>
</svg>