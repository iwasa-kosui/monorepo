<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b" />
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444" />
    </marker>
  </defs>

  <rect width="800" height="160" fill="#fafafa" rx="8" />

  <!-- Gap box -->
  <rect x="30" y="50" width="70" height="58" rx="8" fill="#fff" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" />
  <text x="65" y="76" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="700" fill="#ef4444">？</text>

  <!-- Callout bubble from ? -->
  <!-- Bubble body -->
  <rect x="16" y="118" width="168" height="34" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <!-- Bubble tail pointing up to ? box -->
  <polygon points="56,118 65,108 74,118" fill="#fef2f2" stroke="#fca5a5" stroke-width="1" />
  <line x1="57" y1="117" x2="73" y2="117" stroke="#fef2f2" stroke-width="2" />
  <!-- Bubble text -->
  <text x="100" y="135" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#991b1b">システムの受益者も</text>
  <text x="100" y="148" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="600" fill="#991b1b">要求を言語化できない</text>

  <!-- Arrow into Kiro flow -->
  <line x1="104" y1="79" x2="138" y2="79" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)" />

  <!-- Kiro flow bracket -->
  <rect x="148" y="34" width="632" height="92" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" />
  <text x="464" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">Kiro のスコープ</text>

  <!-- requirements.md -->
  <rect x="162" y="58" width="150" height="56" rx="8" fill="#dbeafe" stroke="#60a5fa" stroke-width="1.5" />
  <text x="237" y="78" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#1e40af">requirements.md</text>
  <text x="237" y="96" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#1d4ed8">ユーザーストーリー・受入基準</text>

  <line x1="316" y1="86" x2="348" y2="86" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- design.md -->
  <rect x="356" y="58" width="150" height="56" rx="8" fill="#e0e7ff" stroke="#818cf8" stroke-width="1.5" />
  <text x="431" y="78" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#3730a3">design.md</text>
  <text x="431" y="96" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#4338ca">アーキテクチャ・技術判断</text>

  <line x1="510" y1="86" x2="542" y2="86" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" />

  <!-- tasks.md -->
  <rect x="550" y="58" width="150" height="56" rx="8" fill="#ede9fe" stroke="#a78bfa" stroke-width="1.5" />
  <text x="625" y="78" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="600" fill="#4c1d95">tasks.md</text>
  <text x="625" y="96" text-anchor="middle" dominant-baseline="central" font-size="9" fill="#5b21b6">実装タスク</text>
</svg>