name: Preview Deploy kosui-me

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "apps/kosui-me/**"
      - ".github/workflows/preview-kosui-me.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  preview-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build kosui-me
        run: pnpm --filter kosui-me run build

      - name: Deploy to Cloudflare Pages (Preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/kosui-me/dist --project-name=kosui-me --branch=${{ github.head_ref }} --commit-message="${{ github.sha }}"
          packageManager: npm

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-deploy-kosui-me -->';
            const deploymentUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const sha = '${{ github.sha }}';

            const body = [
              marker,
              '🚀 **Preview deployment ready!**',
              '',
              '| App | URL |',
              '|-----|-----|',
              `| kosui-me | ${deploymentUrl} |`,
              '',
              `Commit: ${sha}`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
